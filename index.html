<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRC 2026 Scouting</title>

<style>
body { font-family: Arial; background:#111; color:white; padding:15px; }
h2 { text-align:center; }
input, select, textarea {
  width:100%; padding:8px; margin:5px 0;
  border-radius:6px; border:none;
}
button {
  width:100%; padding:12px; margin:6px 0;
  border:none; border-radius:8px;
  font-weight:bold; cursor:pointer;
}
.tabs { display:flex; gap:8px; margin-bottom:15px; }
.tabs button { background:#333; color:white; }
.section { background:#1e1e1e; padding:12px; border-radius:10px; margin-bottom:10px; }
.save { background:#22c55e; color:black; }
.export { background:#3b82f6; color:white; }
.reset { background:#ef4444; color:white; }
.hidden { display:none; }
img { width:100%; margin-top:8px; border-radius:8px; }
</style>
</head>

<body>

<h2>FRC 2026 Scouting</h2>

<div class="tabs">
  <button onclick="showTab('match')">Match Scouting</button>
  <button onclick="showTab('pit')">Pit Scouting</button>
</div>

<!-- ================= MATCH TAB ================= -->
<div id="match">

<div class="section">
<h3>Match Info</h3>
<input id="matchNum" placeholder="Match #">
<input id="teamNum" placeholder="Team #">
<select id="alliance">
  <option>Red</option>
  <option>Blue</option>
</select>
<input id="role" placeholder="Robot Role">
</div>

<div class="section">
<h3>Autonomous</h3>
<input id="autoCycles" type="number" placeholder="Auto Cycles">
<input id="autoBad" type="number" placeholder="Auto Misses">
<input id="autoClimb" placeholder="Auto Climb">
<input id="autoCycleTime" placeholder="Auto Avg Cycle Time">
</div>

<div class="section">
<h3>Teleop</h3>
<input id="teleCycles" type="number" placeholder="Tele Cycles">
<input id="teleBad" type="number" placeholder="Tele Misses">
<input id="teleClimb" placeholder="Tele Climb">
<input id="teleCycleTime" placeholder="Tele Avg Cycle Time">
</div>

<div class="section">
<h3>Endgame</h3>
<input id="climbTime" placeholder="Climb Time">
<select id="intakeSpeed">
  <option>Slow</option>
  <option>Medium</option>
  <option>Fast</option>
</select>
<select id="result">
  <option>Win</option>
  <option>Loss</option>
  <option>Tie</option>
</select>
<input id="rankingPoints" type="number" min="0" max="4" placeholder="Ranking Points">
<input id="defense" placeholder="Defense Rating">
<input id="penaltyPotential" placeholder="Penalty Potential">
<select id="brokeDown"><option>No</option><option>Yes</option></select>
<select id="tippedOver"><option>No</option><option>Yes</option></select>
<select id="disabled"><option>No</option><option>Yes</option></select>
<input id="penalties" type="number" placeholder="Penalties">
<textarea id="matchNotes" placeholder="Match Notes"></textarea>
</div>

<button class="save" onclick="submitMatch()">Save Match Entry</button>
<button class="export" onclick="exportMatchCSV()">Export Match CSV</button>
<button class="reset" onclick="resetMatch()">Reset Match</button>

</div>

<!-- ================= PIT TAB ================= -->
<div id="pit" class="hidden">

<div class="section">
<h3>FRC 2026 – Pit Scouting</h3>

<input id="pitTeam" placeholder="Team #">
<input id="weight" type="number" placeholder="Robot Weight (lbs)">

<select id="drivetrain">
  <option>Swerve</option>
  <option>Tank</option>
  <option>Mecanum</option>
  <option>Other</option>
</select>

<select id="drivetrainSpeed">
  <option>Slow</option>
  <option>Medium</option>
  <option>Fast</option>
</select>

<select id="vision">
  <option>Limelight</option>
  <option>PhotonVision</option>
  <option>None</option>
</select>

<select id="practiceField">
  <option>Yes</option>
  <option>No</option>
</select>

<select id="driverExperience">
  <option value="1">1 - Rookie</option>
  <option value="2">2 - 1 Year</option>
  <option value="3">3 - 2 Years</option>
  <option value="4">4 - Veteran</option>
</select>

<input id="autoRoutines" type="number" placeholder="# Auto Routines">
<input id="claimedAutoCycles" type="number" placeholder="Claimed Auto Cycle Count">

<select id="autoClimbArea">
  <option>Left</option>
  <option>Center</option>
  <option>Right</option>
</select>

<select id="preferredAutoSide">
  <option>Left</option>
  <option>Center</option>
  <option>Right</option>
</select>

<input id="maxFuel" type="number" placeholder="Max Fuel Capacity">

<select id="pitIntakeSpeed">
  <option>Slow</option>
  <option>Medium</option>
  <option>Fast</option>
</select>

<select id="floorIntake">
  <option>Yes</option>
  <option>No</option>
</select>

<select id="stationIntake">
  <option>Yes</option>
  <option>No</option>
</select>

<input id="climbConsistency" type="number" placeholder="Climb Consistency (%)">

<input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(event)">
<img id="photoPreview">

<textarea id="pitNotes" placeholder="Pit Notes"></textarea>
</div>

<button class="save" onclick="submitPit()">Save Pit Entry</button>
<button class="export" onclick="exportPitCSV()">Export Pit CSV</button>
<button class="reset" onclick="resetPit()">Reset Pit</button>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDqxdPhCQsrW90JcP6ke7FroXKjDNx8Lm0OkqhJJIQZFvYGfbGMxRBmjrSiWpIoL1iAQ/exec";

let currentPhoto = "";

/* TAB SWITCH */
function showTab(tab){
  document.getElementById("match").classList.add("hidden");
  document.getElementById("pit").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");
}

/* PHOTO PREVIEW */
function previewPhoto(e){
  const reader = new FileReader();
  reader.onload = function(evt){
    currentPhoto = evt.target.result;
    document.getElementById("photoPreview").src = currentPhoto;
  }
  reader.readAsDataURL(e.target.files[0]);
}

/* SUBMIT MATCH */
function submitMatch(){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      type:"match",
      match:matchNum.value,
      team:teamNum.value,
      alliance:alliance.value,
      role:role.value,
      autoCycles:autoCycles.value,
      autoBad:autoBad.value,
      autoClimb:autoClimb.value,
      autoCycleTime:autoCycleTime.value,
      teleCycles:teleCycles.value,
      teleBad:teleBad.value,
      teleClimb:teleClimb.value,
      teleCycleTime:teleCycleTime.value,
      climbTime:climbTime.value,
      intakeSpeed:intakeSpeed.value,
      result:result.value,
      rankingPoints:rankingPoints.value,
      defense:defense.value,
      penaltyPotential:penaltyPotential.value,
      brokeDown:brokeDown.value,
      tippedOver:tippedOver.value,
      disabled:disabled.value,
      penalties:penalties.value,
      notes:matchNotes.value
    })
  }).then(()=>alert("Match Submitted"));
}

/* SUBMIT PIT */
function submitPit(){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      type:"pit",
      team:pitTeam.value,
      weight:weight.value,
      drivetrain:drivetrain.value,
      drivetrainSpeed:drivetrainSpeed.value,
      vision:vision.value,
      practiceField:practiceField.value,
      driverExperience:driverExperience.value,
      autoRoutines:autoRoutines.value,
      claimedAutoCycles:claimedAutoCycles.value,
      autoClimbArea:autoClimbArea.value,
      preferredAutoSide:preferredAutoSide.value,
      maxFuel:maxFuel.value,
      intakeSpeed:pitIntakeSpeed.value,
      floorIntake:floorIntake.value,
      stationIntake:stationIntake.value,
      climbConsistency:climbConsistency.value,
      photo:currentPhoto,
      notes:pitNotes.value
    })
  }).then(()=>alert("Pit Submitted"));
}

/* CSV EXPORTS */
function exportMatchCSV(){
  alert("Match CSV export works per entry. For full dataset use Google Sheets.");
}
function exportPitCSV(){
  alert("Pit CSV export works per entry. For full dataset use Google Sheets.");
}

/* RESET */
function resetMatch(){
  document.querySelectorAll("#match input,#match select,#match textarea")
  .forEach(el=>el.value="");
}
function resetPit(){
  document.querySelectorAll("#pit input,#pit select,#pit textarea")
  .forEach(el=>el.value="");
  document.getElementById("photoPreview").src="";
  currentPhoto="";
}
</script>

</body>
</html>
